version: '3.8'

services:

  jenkins:
    image: jenkins-podman:latest # costume img
    container_name: jenkins-podman
    restart: unless-stopped

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      # Correct host socket path (most common for rootless Podman)
      - /run/user/1000/podman/podman.sock:/run/podman/podman.sock:rw

    environment:
      - CONTAINER_HOST=unix:///run/podman/podman.sock

    security_opt:
      - label=disable

    # force run as (UID 1000)
    user: "1000:1000"

volumes:
  jenkins_home:
    name: jenkins_home
